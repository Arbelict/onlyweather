<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌸 77天气</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Microsoft YaHei',sans-serif;background:linear-gradient(135deg,#ffeef8,#fce4ec,#f8bbd0);min-height:100vh;color:#5d4e60}
.container{max-width:1200px;margin:0 auto;padding:16px 12px}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding:12px 16px;background:rgba(255,255,255,0.9);border-radius:16px;border:2px solid rgba(255,182,193,0.4)}
.logo{font-size:18px;font-weight:700;background:linear-gradient(135deg,#ff6b9d,#c44569);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.city-btn{background:linear-gradient(135deg,#ff9a9e,#fecfef);border:none;color:#fff;padding:8px 16px;border-radius:20px;cursor:pointer;font-size:13px;font-weight:600;max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hero{display:grid;grid-template-columns:1.2fr 1fr;gap:12px;margin-bottom:16px}
.main-card{background:linear-gradient(145deg,rgba(255,255,255,0.95),rgba(255,240,245,0.9));border:2px solid rgba(255,182,193,0.4);border-radius:18px;padding:20px;position:relative}
.main-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,#ff6b9d,#ffb6c1,#ff6b9d)}
.bg-icon{position:absolute;right:-10px;top:-10px;font-size:100px;opacity:0.1}
.main-card .location{font-size:13px;color:#9c7b8e;margin-bottom:2px}
.main-card .temp{font-size:56px;font-weight:800;background:linear-gradient(135deg,#ff6b9d,#ff8a80);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.main-card .desc{font-size:18px;color:#8b6b7b;font-weight:600}
.main-card .feels{font-size:12px;color:#b8a0ad;margin-bottom:12px}
.main-card .meta{display:flex;gap:10px;flex-wrap:wrap}
.main-card .meta-item{display:flex;align-items:center;gap:4px;font-size:12px;color:#9c7b8e;background:rgba(255,182,193,0.15);padding:5px 10px;border-radius:12px}
.info-card{background:rgba(255,255,255,0.9);border:2px solid rgba(221,160,221,0.3);border-radius:18px;padding:16px}
.info-card h3{font-size:12px;color:#9c7b8e;text-transform:uppercase;margin-bottom:12px;font-weight:700}
.info-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px dashed rgba(255,182,193,0.2)}
.info-label{color:#b8a0ad}
.info-value{font-weight:700;color:#ff6b9d}
.section-title{font-size:14px;font-weight:700;color:#c44569;margin-bottom:10px}
.hourly-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:10px;margin-bottom:16px;scrollbar-width:none}
.hourly-scroll::-webkit-scrollbar{display:none}
.hour-card{flex-shrink:0;background:rgba(255,255,255,0.9);border:2px solid rgba(255,218,233,0.5);border-radius:14px;padding:12px 8px;text-align:center;width:68px}
.hour-card.now{border-color:#ff6b9d;background:linear-gradient(#fff5f8,#ffe4ec)}
.hour-time{font-size:10px;color:#b8a0ad;margin-bottom:4px;font-weight:600}
.hour-card.now .hour-time{color:#ff6b9d}
.hour-icon{font-size:22px;margin-bottom:4px}
.hour-temp{font-size:14px;font-weight:700;color:#c44569}
.weekly-grid{background:rgba(255,255,255,0.9);border:2px solid rgba(221,160,221,0.2);border-radius:18px;overflow:hidden;margin-bottom:16px}
.week-row{display:grid;grid-template-columns:55px 45px 1fr 1fr;align-items:center;padding:12px 14px;border-bottom:1px solid rgba(255,218,233,0.2)}
.week-row:last-child{border-bottom:none}
.week-row.today{background:linear-gradient(90deg,rgba(255,182,193,0.1),rgba(221,160,221,0.05))}
.week-day{font-size:13px;color:#9c7b8e;font-weight:600}
.week-row.today .week-day{color:#ff6b9d;font-weight:800}
.week-icon{font-size:20px}
.week-temps{font-size:13px;display:flex;gap:6px}
.week-low{color:#8b7b9e}
.week-high{color:#ff6b9d;font-weight:700}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.stat-card{background:rgba(255,255,255,0.9);border:2px solid rgba(255,218,233,0.4);border-radius:14px;padding:14px 10px;text-align:center}
.stat-icon{font-size:20px;margin-bottom:4px}
.stat-value{font-size:18px;font-weight:800;color:#ff6b9d}
.stat-label{font-size:10px;color:#b8a0ad}
.chart-card{background:rgba(255,255,255,0.9);border:2px solid rgba(221,160,221,0.2);border-radius:18px;padding:18px;margin-bottom:16px}
.sun-card{background:rgba(255,255,255,0.9);border:2px solid rgba(255,218,233,0.3);border-radius:18px;padding:18px;margin-bottom:16px}
.sun-timeline{margin:14px 0}
.sun-track{height:8px;background:rgba(255,218,233,0.4);border-radius:4px;position:relative}
.sun-progress{height:100%;border-radius:4px;background:linear-gradient(90deg,#ffb6c1,#ff6b9d)}
.sun-dot{position:absolute;top:50%;transform:translate(-50%,-50%);width:14px;height:14px;border-radius:50%;border:2px solid #fff}
.sun-dot.sunrise{background:#ffb6c1;left:0}
.sun-dot.current{background:#ff6b9d;box-shadow:0 0 10px rgba(255,107,157,0.4)}
.sun-dot.sunset{background:#dda0dd;right:0;transform:translate(50%,-50%)}
.sun-labels{display:flex;justify-content:space-between;margin-top:18px}
.sun-label{text-align:center}
.sun-label-icon{font-size:20px}
.sun-label-time{font-size:14px;font-weight:700;color:#ff6b9d}
.sun-label-text{font-size:11px;color:#b8a0ad}
.current-time{text-align:center;margin-top:12px;font-size:13px;color:#b8a0ad}
.footer{text-align:center;font-size:11px;color:#b8a0ad;margin-top:20px;padding-top:14px;border-top:1px dashed rgba(255,182,193,0.3)}
.loading{position:fixed;top:0;left:0;right:0;bottom:0;background:linear-gradient(135deg,#ffeef8,#fce4ec);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity 0.3s}
.loading.hidden{opacity:0;pointer-events:none}
.loading-icon{font-size:56px;animation:bounce 0.8s ease-in-out infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.loading-text{color:#c44569;font-size:14px;font-weight:600;margin-top:12px}
.modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(255,240,245,0.95);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px}
.modal.hidden{display:none}
.modal-content{background:#fff;border:2px solid rgba(255,182,193,0.4);border-radius:20px;padding:22px;width:100%;max-width:380px;max-height:70vh;display:flex;flex-direction:column}
.modal-title{font-size:18px;font-weight:800;margin-bottom:14px;text-align:center;color:#c44569}
.modal-input{width:100%;padding:14px 16px;background:rgba(255,240,245,0.8);border:2px solid rgba(255,182,193,0.3);border-radius:14px;color:#5d4e60;font-size:15px;outline:none;margin-bottom:12px}
.modal-input:focus{border-color:#ff6b9d}
.modal-input::placeholder{color:#b8a0ad}
.modal-results{flex:1;overflow-y:auto;min-height:120px;max-height:280px}
.modal-result{padding:12px 14px;border-radius:12px;cursor:pointer;font-size:14px;border-bottom:1px dashed rgba(255,218,233,0.2);display:flex;justify-content:space-between}
.modal-result:hover{background:rgba(255,182,193,0.15)}
.modal-result:last-child{border-bottom:none}
.result-city{font-weight:700;color:#c44569}
.result-country{font-size:12px;color:#b8a0ad}
.modal-close{margin-top:12px;text-align:center;color:#b8a0ad;font-size:13px;cursor:pointer;padding:10px;border-radius:12px}
.modal-close:hover{background:rgba(255,182,193,0.15);color:#ff6b9d}
.modal-loading,.modal-empty{text-align:center;padding:20px;color:#b8a0ad}
@media(max-width:768px){.hero{grid-template-columns:1fr}.stats-grid{grid-template-columns:repeat(2,1fr)}.week-row{grid-template-columns:50px 40px 1fr 1fr}}
</style>
</head>
<body>
<div class="loading" id="loading"><div class="loading-icon">🌸</div><div class="loading-text" id="loadingText">加载中...</div></div>
<div class="modal hidden" id="cityModal"><div class="modal-content"><div class="modal-title">🔍 搜索城市</div><input type="text" class="modal-input" id="cityInput" placeholder="输入城市名称..."><div class="modal-results" id="cityResults"><div class="modal-loading">请输入城市名称 💕</div></div><div class="modal-close" id="cityClose">取消</div></div></div>
<div class="container">
<div class="header"><div class="logo">🌸 77天气</div><button class="city-btn" id="cityBtn">📍 北京</button></div>
<div class="hero">
<div class="main-card"><div class="bg-icon" id="bgIcon">☁️</div><div class="location">📍 <span id="cityName">北京市</span></div><div class="temp" id="currentTemp">--°</div><div class="desc" id="weatherDesc">加载中...</div><div class="feels" id="feelsLike">体感 --°</div><div class="meta"><span class="meta-item">💨 <span id="windSpeed">--</span> km/h</span><span class="meta-item">💧 <span id="humidity">--</span>%</span><span class="meta-item">🌡️ <span id="pressure">--</span></span></div></div>
<div class="info-card"><h3>📋 详细信息</h3><div class="info-row"><span class="info-label">风速</span><span class="info-value" id="windDetail">-- km/h</span></div><div class="info-row"><span class="info-label">湿度</span><span class="info-value" id="humidityDetail">--%</span></div><div class="info-row"><span class="info-label">气压</span><span class="info-value" id="pressureDetail">-- hPa</span></div><div class="info-row"><span class="info-label">体感</span><span class="info-value" id="feelsDetail">--°C</span></div></div>
</div>
<div class="section-title">⏰ 24小时预报</div>
<div class="hourly-scroll" id="hourlyScroll"></div>
<div class="section-title">📅 未来一周</div>
<div class="weekly-grid" id="weeklyGrid"></div>
<div class="chart-card"><div class="section-title">📈 温度趋势</div><div id="tempChart" style="height:140px;"></div></div>
<div class="section-title">📊 气象数据</div>
<div class="stats-grid" id="statsGrid"></div>
<div class="sun-card"><div class="section-title">🌅 日出日落</div><div class="sun-timeline"><div class="sun-track"><div class="sun-progress" id="sunProgress"></div><div class="sun-dot sunrise"></div><div class="sun-dot current" id="sunCurrent"></div><div class="sun-dot sunset"></div></div></div><div class="sun-labels"><div class="sun-label"><div class="sun-label-icon">🌅</div><div class="sun-label-time" id="sunriseTime">--:--</div><div class="sun-label-text">日出</div></div><div class="current-time" id="currentTime">--:--:--</div><div class="sun-label"><div class="sun-label-icon">🌇</div><div class="sun-label-time" id="sunsetTime">--:--</div><div class="sun-label-text">日落</div></div></div></div>
<div class="footer">🌸 数据来源：Open-Meteo</div>
</div>
<script>
(function(){
var W={0:{zh:'晴朗',i:'☀️'},1:{zh:'晴间多云',i:'🌤️'},2:{zh:'多云',i:'⛅'},3:{zh:'阴天',i:'☁️'},45:{zh:'雾',i:'🌫️'},51:{zh:'小毛毛雨',i:'🌦️'},61:{zh:'小雨',i:'🌧️'},63:{zh:'中雨',i:'🌧️'},65:{zh:'大雨',i:'⛈️'},71:{zh:'小雪',i:'🌨️'},73:{zh:'中雪',i:'❄️'},80:{zh:'阵雨',i:'🌦️'},81:{zh:'中阵雨',i:'🌧️'},95:{zh:'雷暴',i:'⛈️'}};
var C=[{n:'北京',c:'中国',la:39.9042,lo:116.4074},{n:'上海',c:'中国',la:31.2304,lo:121.4737},{n:'广州',c:'中国',la:23.1291,lo:113.2644},{n:'深圳',c:'中国',la:22.5431,lo:114.0579},{n:'香港',c:'中国',la:22.3193,lo:114.1694},{n:'台北',c:'中国',la:25.033,lo:121.565},{n:'杭州',c:'中国',la:30.2741,lo:120.155},{n:'成都',c:'中国',la:30.5728,lo:104.067},{n:'重庆',c:'中国',la:29.4316,lo:106.912},{n:'武汉',c:'中国',la:30.5928,lo:114.305},{n:'西安',c:'中国',la:34.3416,lo:108.94},{n:'南京',c:'中国',la:32.0603,lo:118.797},{n:'天津',c:'中国',la:39.3434,lo:117.362},{n:'苏州',c:'中国',la:31.2989,lo:120.585},{n:'青岛',c:'中国',la:36.0671,lo:120.383},{n:'长沙',c:'中国',la:28.2282,lo:112.938},{n:'郑州',c:'中国',la:34.7466,lo:113.625},{n:'沈阳',c:'中国',la:41.8057,lo:123.433},{n:'济南',c:'中国',la:36.6512,lo:117.121},{n:'泰安',c:'中国',la:36.1949,lo:117.089},{n:'大连',c:'中国',la:38.914,lo:121.615},{n:'厦门',c:'中国',la:24.4798,lo:118.089},{n:'昆明',c:'中国',la:25.0406,lo:102.713},{n:'三亚',c:'中国',la:18.2528,lo:109.512},{n:'哈尔滨',c:'中国',la:45.8038,lo:126.534},{n:'东京',c:'日本',la:35.6762,lo:139.65},{n:'首尔',c:'韩国',la:37.5665,lo:126.978},{n:'新加坡',c:'新加坡',la:1.3521,lo:103.819},{n:'伦敦',c:'英国',la:51.5074,lo:-0.128},{n:'巴黎',c:'法国',la:48.8566,lo:2.352},{n:'纽约',c:'美国',la:40.7128,lo:-74.006},{n:'洛杉矶',c:'美国',la:34.0522,lo:-118.244},{n:'悉尼',c:'澳大利亚',la:-33.8688,lo:151.209},{n:'迪拜',c:'阿联酋',la:25.2048,lo:55.2708}];
var cc='北京',cn='中国';
function wi(c){return W[c]||{zh:'未知',i:'❓'}}
function fh(d){return(d.getHours()+'').padStart(2,'0')+':00'}
function ft(d){return(d.getHours()+'').padStart(2,'0')+':'+(d.getMinutes()+'').padStart(2,'0')}
function fd(d){var ds=['周日','周一','周二','周三','周四','周五','周六'];return ds[d.getDay()]}
function it(d){var t=new Date();return d.getDate()===t.getDate()&&d.getMonth()===t.getMonth()}
function gd(){var r=[];for(var i=0;i<C.length;i++)r.push('<div class="modal-result" onclick="sC('+C[i].la+','+C[i].lo+',\''+C[i].n+'\',\''+C[i].c+'\')"><div><div class="result-city">'+C[i].n+'</div><div class="result-country">'+C[i].c+'</div></div><div>→</div></div>');document.getElementById('cityResults').innerHTML=r.join('')}
function sc(q){if(!q||q.length<2){gd();return}document.getElementById('cityResults').innerHTML='<div class="modal-loading">搜索中...</div>';var m=C.filter(function(x){return x.n.indexOf(q)!==-1||x.c.indexOf(q)!==-1});var r=[];for(var i=0;i<m.length&&r.length<20;i++)r.push('<div class="modal-result" onclick="sC('+m[i].la+','+m[i].lo+',\''+m[i].n+'\',\''+m[i].c+'\')"><div><div class="result-city">'+m[i].n+'</div><div class="result-country">'+m[i].c+'</div></div><div>→</div></div>');if(r.length===0){document.getElementById('cityResults').innerHTML='<div class="modal-empty">未找到: '+q+'</div>'}else{document.getElementById('cityResults').innerHTML=r.join('')}}
function sC(la,lo,n,c){document.getElementById('cityModal').classList.add('hidden');lw(la,lo,n,c)}
