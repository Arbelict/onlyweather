<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>77天气</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html { font-size: 16px; }
body { font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: linear-gradient(135deg, #fff5f9 0%, #ffe6f0 50%, #ffd9e8 100%); color: #8b5a7d; min-height: 100vh; overflow-x: hidden; }

.container { max-width: 1200px; margin: 0 auto; padding: 20px 16px 40px; }

/* Header */
.header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; padding: 12px 16px; background: rgba(255,182,193,0.3); border-radius: 16px; border: 2px solid rgba(255,105,180,0.4); box-shadow: 0 4px 15px rgba(255,105,180,0.15); }
.logo { display: flex; align-items: center; gap: 8px; font-size: 18px; font-weight: bold; color: #ff69b4; }
.logo-icon { font-size: 24px; }
.city-btn { background: rgba(255,105,180,0.2); border: 2px solid rgba(255,105,180,0.5); color: #ff69b4; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 13px; transition: all 0.3s; max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 600; }
.city-btn:hover { background: rgba(255,105,180,0.35); transform: scale(1.05); box-shadow: 0 4px 12px rgba(255,105,180,0.3); }

/* Hero Cards */
.hero { display: grid; grid-template-columns: 1.2fr 1fr; gap: 16px; margin-bottom: 20px; }
.main-card { background: linear-gradient(145deg, rgba(255,182,193,0.4), rgba(255,192,203,0.3)); border: 2px solid rgba(255,105,180,0.3); border-radius: 20px; padding: 24px; position: relative; overflow: hidden; box-shadow: 0 8px 25px rgba(255,105,180,0.15); }
.main-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, #ff69b4, #ffb6d9); }
.bg-icon { position: absolute; right: -20px; top: -20px; font-size: 140px; opacity: 0.06; pointer-events: none; }
.main-card .location { font-size: 13px; color: #d97bb8; margin-bottom: 4px; display: flex; align-items: center; gap: 4px; font-weight: 600; }
.main-card .temp { font-size: 64px; font-weight: bold; line-height: 1; margin-bottom: 8px; background: linear-gradient(135deg, #ff69b4, #ffb6d9); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.main-card .desc { font-size: 18px; color: #d97bb8; margin-bottom: 4px; font-weight: 600; }
.main-card .feels { font-size: 13px; color: #c97aad; margin-bottom: 16px; }
.main-card .meta { display: flex; gap: 16px; flex-wrap: wrap; }
.main-card .meta-item { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #d97bb8; font-weight: 500; }

.info-card { background: rgba(255,182,193,0.25); border: 2px solid rgba(255,105,180,0.25); border-radius: 20px; padding: 20px; box-shadow: 0 4px 15px rgba(255,105,180,0.1); }
.info-card h3 { font-size: 12px; color: #d97bb8; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; font-weight: 700; }
.info-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(255,105,180,0.15); font-size: 13px; }
.info-row:last-child { border-bottom: none; padding-bottom: 0; }
.info-row:first-of-type { padding-top: 0; }
.info-label { color: #d97bb8; font-weight: 500; }
.info-value { font-weight: 600; color: #8b5a7d; }

/* Section Titles */
.section-title { font-size: 14px; font-weight: 700; color: #d97bb8; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }

/* Hourly Scroll */
.hourly-scroll { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 12px; margin-bottom: 20px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
.hourly-scroll::-webkit-scrollbar { display: none; }
.hour-card { flex-shrink: 0; background: rgba(255,182,193,0.2); border: 2px solid rgba(255,105,180,0.2); border-radius: 14px; padding: 14px 10px; text-align: center; width: 72px; transition: all 0.3s; box-shadow: 0 2px 8px rgba(255,105,180,0.1); }
.hour-card:hover { border-color: #ff69b4; background: rgba(255,105,180,0.3); transform: translateY(-4px); box-shadow: 0 6px 15px rgba(255,105,180,0.2); }
.hour-card.now { border-color: #ff69b4; background: rgba(255,105,180,0.35); box-shadow: 0 4px 12px rgba(255,105,180,0.25); }
.hour-time { font-size: 11px; color: #d97bb8; margin-bottom: 6px; font-weight: 600; }
.hour-card.now .hour-time { color: #ff1493; font-weight: 700; }
.hour-icon { font-size: 24px; margin-bottom: 6px; }
.hour-temp { font-size: 14px; font-weight: 700; color: #8b5a7d; }

/* Weekly Grid */
.weekly-grid { background: rgba(255,182,193,0.2); border: 2px solid rgba(255,105,180,0.25); border-radius: 18px; overflow: hidden; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(255,105,180,0.1); }
.week-row { display: grid; grid-template-columns: 60px 48px 1fr 1fr 70px; align-items: center; padding: 12px 16px; border-bottom: 1px solid rgba(255,105,180,0.15); }
.week-row:last-child { border-bottom: none; }
.week-row:hover { background: rgba(255,105,180,0.1); }
.week-row.today { background: rgba(255,105,180,0.2); }
.week-day { font-size: 13px; color: #d97bb8; font-weight: 600; }
.week-row.today .week-day { color: #ff1493; font-weight: 700; }
.week-icon { font-size: 20px; }
.week-temps { font-size: 13px; font-weight: 600; }
.week-low { color: #ff69b4; }
.week-high { color: #ff1493; }
.week-precip { font-size: 12px; color: #d97bb8; text-align: right; font-weight: 500; }

/* Stats Grid */
.stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
.stat-card { background: rgba(255,182,193,0.25); border: 2px solid rgba(255,105,180,0.2); border-radius: 14px; padding: 16px 12px; text-align: center; box-shadow: 0 2px 10px rgba(255,105,180,0.1); transition: all 0.3s; }
.stat-card:hover { transform: translateY(-4px); box-shadow: 0 6px 15px rgba(255,105,180,0.2); }
.stat-icon { font-size: 22px; margin-bottom: 8px; }
.stat-value { font-size: 18px; font-weight: bold; margin-bottom: 4px; color: #ff69b4; }
.stat-label { font-size: 11px; color: #d97bb8; font-weight: 600; }

/* Chart */
.chart-card { background: rgba(255,182,193,0.2); border: 2px solid rgba(255,105,180,0.25); border-radius: 18px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(255,105,180,0.1); }
.chart-title { font-size: 14px; font-weight: 700; margin-bottom: 16px; color: #d97bb8; }

/* Sun Card */
.sun-card { background: rgba(255,182,193,0.2); border: 2px solid rgba(255,105,180,0.25); border-radius: 18px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(255,105,180,0.1); }
.sun-timeline { margin: 16px 0; }
.sun-track { height: 8px; background: rgba(255,105,180,0.15); border-radius: 4px; position: relative; }
.sun-progress { height: 100%; border-radius: 4px; background: linear-gradient(90deg, #ffb6d9, #ff69b4); transition: width 1s ease; }
.sun-dot { position: absolute; top: 50%; transform: translate(-50%, -50%); width: 14px; height: 14px; border-radius: 50%; border: 2px solid #fff5f9; }
.sun-dot.sunrise { background: #ffb6d9; left: 0; }
.sun-dot.current { background: #ff69b4; box-shadow: 0 0 8px #ff69b4; }
.sun-dot.sunset { background: #ff1493; right: 0; transform: translate(50%, -50%); }
.sun-labels { display: flex; justify-content: space-between; margin-top: 20px; }
.sun-label { text-align: center; }
.sun-label-icon { font-size: 20px; margin-bottom: 4px; }
.sun-label-time { font-size: 14px; font-weight: 700; color: #d97bb8; }
.sun-label-text { font-size: 11px; color: #d97bb8; font-weight: 600; }
.current-time { text-align: center; margin-top: 12px; font-size: 13px; color: #d97bb8; font-weight: 600; }

/* Footer */
.footer { text-align: center; font-size: 11px; color: #d97bb8; margin-top: 24px; padding-top: 16px; border-top: 1px solid rgba(255,105,180,0.2); font-weight: 500; }

/* Loading Screen */
.loading { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(135deg, #fff5f9 0%, #ffe6f0 100%); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.5s; }
.loading.hidden { opacity: 0; pointer-events: none; }
.loading-icon { font-size: 56px; animation: float 2s ease-in-out infinite; margin-bottom: 16px; }
.loading-text { color: #d97bb8; font-size: 14px; font-weight: 600; }
.loading-bar { width: 160px; height: 3px; background: rgba(255,105,180,0.2); border-radius: 2px; margin-top: 16px; overflow: hidden; }
.loading-bar-fill { height: 100%; background: linear-gradient(90deg, #ff69b4, #ffb6d9); border-radius: 2px; animation: loading 1.5s ease-in-out infinite; }
@keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
@keyframes loading { 0% { width: 0; margin-left: 0; } 50% { width: 50%; margin-left: 25%; } 100% { width: 0; margin-left: 100%; } }

/* Modal */
.modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(139,90,125,0.7); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px; backdrop-filter: blur(8px); }
.modal.hidden { display: none; }
.modal-content { background: linear-gradient(135deg, #fff5f9 0%, #ffe6f0 100%); border: 2px solid rgba(255,105,180,0.3); border-radius: 20px; padding: 24px; width: 100%; max-width: 400px; max-height: 80vh; display: flex; flex-direction: column; box-shadow: 0 10px 40px rgba(255,105,180,0.3); }
.modal-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; text-align: center; color: #ff69b4; }
.modal-input { width: 100%; padding: 14px 16px; background: rgba(255,182,193,0.2); border: 2px solid rgba(255,105,180,0.3); border-radius: 12px; color: #8b5a7d; font-size: 15px; outline: none; margin-bottom: 12px; font-weight: 500; }
.modal-input:focus { border-color: #ff69b4; background: rgba(255,182,193,0.3); box-shadow: 0 0 10px rgba(255,105,180,0.2); }
.modal-input::placeholder { color: #d97bb8; }
.modal-results { flex: 1; overflow-y: auto; min-height: 150px; max-height: 300px; }
.modal-result { padding: 12px 14px; border-radius: 10px; cursor: pointer; transition: background 0.2s; font-size: 14px; border-bottom: 1px solid rgba(255,105,180,0.1); display: flex; justify-content: space-between; align-items: center; color: #8b5a7d; font-weight: 500; }
.modal-result:hover { background: rgba(255,105,180,0.15); }
.modal-result:last-child { border-bottom: none; }
.result-city { font-weight: 700; color: #ff69b4; }
.result-country { font-size: 12px; color: #d97bb8; }
.modal-close { margin-top: 12px; text-align: center; color: #d97bb8; font-size: 13px; cursor: pointer; padding: 10px; font-weight: 600; transition: all 0.2s; }
.modal-close:hover { color: #ff69b4; }
.modal-loading { text-align: center; padding: 20px; color: #d97bb8; font-size: 13px; font-weight: 500; }
.modal-empty { text-align: center; padding: 20px; color: #d97bb8; font-size: 13px; font-weight: 500; }

/* Mobile Responsive */
@media (max-width: 768px) {
html { font-size: 15px; }
.container { padding: 16px 12px 32px; }
.header { padding: 10px 12px; margin-bottom: 16px; }
.logo { font-size: 16px; }
.logo-icon { font-size: 20px; }
.city-btn { padding: 6px 12px; font-size: 12px; max-width: 120px; }
.hero { grid-template-columns: 1fr; gap: 12px; margin-bottom: 16px; }
.main-card { padding: 20px; }
.main-card .temp { font-size: 56px; }
.main-card .meta { gap: 12px; }
.main-card .meta-item { font-size: 12px; }
.info-card { padding: 16px; }
.section-title { font-size: 13px; margin-bottom: 10px; }
.hour-card { width: 64px; padding: 12px 8px; }
.hour-icon { font-size: 20px; }
.hour-temp { font-size: 13px; }
.week-row { grid-template-columns: 50px 40px 1fr 1fr; padding: 10px 12px; }
.week-row > *:nth-child(n+5) { display: none; }
.stats-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 16px; }
.stat-card { padding: 14px 10px; }
.stat-value { font-size: 16px; }
.chart-card { padding: 16px; margin-bottom: 16px; }
.sun-card { padding: 16px; margin-bottom: 16px; }
}

@media (max-width: 480px) {
.main-card .temp { font-size: 48px; }
.main-card .desc { font-size: 16px; }
.week-row { grid-template-columns: 45px 36px 1fr 1fr; }
.week-day { font-size: 12px; }
.week-icon { font-size: 18px; }
.week-temps { font-size: 12px; }
}

/* Stars Background */
.stars { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
.star { position: absolute; border-radius: 50%; background: white; animation: twinkle var(--d, 3s) infinite ease-in-out var(--delay, 0s); opacity: 0; }
@keyframes twinkle { 0%, 100% { opacity: 0; } 50% { opacity: var(--o, 0.6); } }
.container { position: relative; z-index: 1; }
</style>
</head>

</div>

  function initStars() {
    // 减少星星数量，使用CSS伪元素更快
    var stars = document.getElementById('stars');
    // 使用单一SVG生成所有星星，避免大量DOM操作

    svg.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;';

    filter.setAttribute('id', 'glow');
    var feGaussian = document.createElementNS('http://www.w3.org/2000/svg', 'feGaussianBlur');
    feGaussian.setAttribute('stdDeviation', '1');
    feGaussian.setAttribute('result', 'coloredBlur');
    filter.appendChild(feGaussian);
    defs.appendChild(filter);
    svg.appendChild(defs);
    
    // 只生成20个星星，减少DOM
    for (var i = 0; i < 20; i++) {
      var cx = Math.random() * 100;

      svg.appendChild(circle);
    }
    stars.appendChild(svg);
  }

  function getWeatherInfo(code) {
    return WMO[code] || { zh: '未知', icon: '❓' };
  }

  function formatHour(d) { return d.getHours().toString().padStart(2, '0') + ':00'; }
  function formatTime(d) { return d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0'); }
  function getDayName(d) { var days = ['周日', '周一', '周二', '周三', '周四', '周五', '周六']; return days[d.getDay()]; }
  function isToday(d) { var t = new Date(); return d.getDate() === t.getDate() && d.getMonth() === t.getMonth(); }

  async function searchCity(query) {
    if (!query || query.length < 2) {
      showHotCities();
      return;
    }
    
    document.getElementById('cityResults').innerHTML = '<div class="modal-loading">搜索中...</div>';
    
    var results = [];
    
    try {
      // 先搜索本地城市列表
      var localMatch = HOT_CITIES.filter(function(c) {
        return c.name.indexOf(query) !== -1 || 
               c.country.indexOf(query) !== -1 ||
               pinyinMatch(c.name, query);
      });
      
      for (var i = 0; i < localMatch.length && results.length < 20; i++) {
        results.push({
          name: localMatch[i].name,
          country: localMatch[i].country,
          admin: '',
          latitude: localMatch[i].lat,
          longitude: localMatch[i].lon,
          source: 'local'
        });
      }
      
      // 尝试Open-Meteo API
      try {
        var url = 'https://geocoding-api.open-meteo.com/v1/search?name=' + encodeURIComponent(query) + '&count=10&format=json';
        var res = await fetch(url);
        var data = await res.json();
        if (data.results) {
          for (var j = 0; j < data.results.length; j++) {
            var r = data.results[j];
            // 避免重复
            var exists = results.some(function(x) { 
              return Math.abs(x.latitude - r.latitude) < 0.1 && Math.abs(x.longitude - r.longitude) < 0.1; 
            });
            if (!exists) {
              results.push({
                name: r.name,
                country: r.country || '',
                admin: r.admin1 || '',
                latitude: r.latitude,
                longitude: r.longitude,
                source: 'openmeteo'
              });
            }
          }
        }
      } catch (e) {}
      
      // 尝试Nominatim（备用）
      if (results.length < 5) {
        try {
          var nomUrl = 'https://nominatim.openstreetmap.org/search?q=' + encodeURIComponent(query) + '&format=json&limit=5&accept-language=zh';
          var nomRes = await fetch(nomUrl, { headers: { 'User-Agent': '77天气 Weather App' } });
          var nomData = await nomRes.json();
          for (var k = 0; k < nomData.length; k++) {
            var n = nomData[k];
            var exists = results.some(function(x) { 
              return Math.abs(x.latitude - parseFloat(n.lat)) < 0.1 && Math.abs(x.longitude - parseFloat(n.lon)) < 0.1; 
            });
            if (!exists) {
              results.push({
                name: n.display_name.split(',')[0],
                country: n.display_name.split(',').slice(-1)[0].trim(),
                admin: n.display_name.split(',').slice(1, -1).join(', '),
                latitude: parseFloat(n.lat),
                longitude: parseFloat(n.lon),
                source: 'nominatim'
              });
            }
          }
        } catch (e) {}
      }
      
      if (results.length === 0) {
        document.getElementById('cityResults').innerHTML = '<div class="modal-empty">未找到: ' + query + '</div>';
        return;
      }
      
      var html = '';
      for (var m = 0; m < results.length; m++) {
        var city = results[m];
        var displayName = city.name + (city.admin ? ' (' + city.admin + ')' : '');
        html += '<div class="modal-result" data-lat="' + city.latitude + '" data-lon="' + city.longitude + '" data-name="' + city.name + '" data-country="' + city.country + '">' +
          '<div><div class="result-city">' + displayName + '</div><div class="result-country">' + city.country + '</div></div>' +
          '<div>→</div></div>';
      }
      document.getElementById('cityResults').innerHTML = html;
      
      var items = document.querySelectorAll('.modal-result[data-lat]');
      for (var p = 0; p < items.length; p++) {
        items[p].addEventListener('click', function() {
          var lat = parseFloat(this.getAttribute('data-lat'));
          var lon = parseFloat(this.getAttribute('data-lon'));
          var name = this.getAttribute('data-name');
          var country = this.getAttribute('data-country');
          hideModal();
          loadWeatherByCoords(lat, lon, name, country);
        });
      }
    } catch (e) {
      console.error('Search error:', e);
      document.getElementById('cityResults').innerHTML = '<div class="modal-empty">搜索失败，请重试</div>';
    }
  }

      '济南': 'jinan|jn', '大连': 'dalian|dl', '哈尔滨': 'haerbin|heb',
      '长春': 'changchun|cc', '福州': 'fuzhou|fz', '厦门': 'xiamen|xm',
      '南昌': 'nanchang|nc', '昆明': 'kunming|km', '贵阳': 'guiyang|gy',

  async function loadWeatherByCoords(lat, lon, cityName, country) {
    var loading = document.getElementById('loading');
    var loadingText = document.getElementById('loadingText');
    loadingText.textContent = '正在加载 ' + cityName + ' 天气...';
    loading.classList.remove('hidden');

    try {
      currentCity = cityName || lat.toFixed(2);
      currentCountry = country || '';

      var url = 'https://api.open-meteo.com/v1/forecast?' +
        'latitude=' + lat + '&longitude=' + lon +
        '&current=temperature_2m,relative_humidity_2m,apparent_temperature,wind_speed_10m,pressure_msl,weather_code' +
        '&hourly=temperature_2m,weather_code,wind_speed_10m' +
        '&daily=temperature_2m_max,temperature_2m_min,weather_code,precipitation_sum,wind_speed_10m_max,sunrise,sunset' +
        '&timezone=auto&forecast_days=7';

      var res = await fetch(url);
      if (!res.ok) throw new Error('API ' + res.status);
      var data = await res.json();

      // 更新UI
      document.getElementById('cityName').textContent = currentCity;
      document.getElementById('countryName').textContent = currentCountry;
      document.getElementById('cityBtn').textContent = '📍 ' + currentCity;

      var cur = data.current;
      var info = getWeatherInfo(cur.weather_code);
      document.getElementById('currentTemp').textContent = Math.round(cur.temperature_2m) + '°';
      document.getElementById('weatherDesc').textContent = info.zh;
      document.getElementById('feelsLike').textContent = '体感 ' + Math.round(cur.apparent_temperature) + '°';
      document.getElementById('windSpeed').textContent = Math.round(cur.wind_speed_10m);
      document.getElementById('humidity').textContent = Math.round(cur.relative_humidity_2m);
      document.getElementById('pressure').textContent = Math.round(cur.pressure_msl);
      document.getElementById('bgIcon').textContent = info.icon;

      document.getElementById('windDetail').textContent = Math.round(cur.wind_speed_10m) + ' km/h';
      document.getElementById('humidityDetail').textContent = Math.round(cur.relative_humidity_2m) + '%';
      document.getElementById('pressureDetail').textContent = Math.round(cur.pressure_msl) + ' hPa';
      document.getElementById('feelsDetail').textContent = Math.round(cur.apparent_temperature) + '°C';

      // 24小时
      var hourlyHtml = '';
      for (var i = 0; i < 24; i++) {
        var t = new Date(data.hourly.time[i]);
        var w = getWeatherInfo(data.hourly.weather_code[i]);
        hourlyHtml += '<div class="hour-card' + (i === 0 ? ' now' : '') + '">' +
          '<div class="hour-time">' + formatHour(t) + '</div>' +
          '<div class="hour-icon">' + w.icon + '</div>' +
          '<div class="hour-temp">' + Math.round(data.hourly.temperature_2m[i]) + '°</div></div>';
      }
      document.getElementById('hourlyScroll').innerHTML = hourlyHtml;

      // 一周
      var weeklyHtml = '';
      for (var j = 0; j < 7; j++) {
        var d = new Date(data.daily.time[j]);
        var w = getWeatherInfo(data.daily.weather_code[j]);
        var p = data.daily.precipitation_sum ? data.daily.precipitation_sum[j] : 0;
        weeklyHtml += '<div class="week-row' + (isToday(d) ? ' today' : '') + '">' +
          '<div class="week-day">' + (isToday(d) ? '今天' : getDayName(d)) + '</div>' +
          '<div class="week-icon">' + w.icon + '</div>' +
          '<div class="week-temps"><span class="week-low">' + Math.round(data.daily.temperature_2m_min[j]) + '°</span> <span class="week-high">' + Math.round(data.daily.temperature_2m_max[j]) + '°</span></div>' +
          '<div class="week-precip">💧 ' + p.toFixed(1) + 'mm</div></div>';
      }
      document.getElementById('weeklyGrid').innerHTML = weeklyHtml;

      // 温度图表
      renderChart(data);

      // 统计数据
      document.getElementById('statsGrid').innerHTML =
        '<div class="stat-card"><div class="stat-icon">🌡️</div><div class="stat-value" style="color:#ff69b4">' + Math.round(cur.temperature_2m) + '°</div><div class="stat-label">当前温度</div></div>' +
        '<div class="stat-card"><div class="stat-icon">💨</div><div class="stat-value" style="color:#ffb6d9">' + Math.round(cur.wind_speed_10m) + '</div><div class="stat-label">风速 km/h</div></div>' +
        '<div class="stat-card"><div class="stat-icon">💧</div><div class="stat-value" style="color:#ff1493">' + Math.round(cur.relative_humidity_2m) + '%</div><div class="stat-label">湿度</div></div>' +
        '<div class="stat-card"><div class="stat-icon">🌡️</div><div class="stat-value" style="color:#ff69b4">' + Math.round(cur.pressure_msl) + '</div><div class="stat-label">气压 hPa</div></div>';

      // 日出日落
      if (data.daily.sunrise && data.daily.sunset) {
        var sunrise = new Date(data.daily.sunrise[0]);
        var sunset = new Date(data.daily.sunset[0]);
        document.getElementById('sunriseTime').textContent = formatTime(sunrise);
        document.getElementById('sunsetTime').textContent = formatTime(sunset);
        var total = sunset.getTime() - sunrise.getTime();
        var elapsed = new Date().getTime() - sunrise.getTime();
        var pct = Math.max(0, Math.min(100, (elapsed / total) * 100));
        document.getElementById('sunProgress').style.width = pct + '%';
        document.getElementById('sunCurrent').style.left = pct + '%';
      }

    } catch (err) {
      console.error('加载失败:', err);
      alert('加载天气失败: ' + err.message);
    } finally {
      loading.classList.add('hidden');
    }
  }

  function renderChart(data) {
    var container = document.getElementById('tempChart');
    container.innerHTML = '';
    var temps = data.hourly.temperature_2m.slice(0, 24);
    var times = data.hourly.time.slice(0, 24);
    var minT = Math.min.apply(null, temps);
    var maxT = Math.max.apply(null, temps);
    var range = maxT - minT || 1;

    var svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
    svg.setAttribute('width', '100%');
    svg.setAttribute('height', '160');
    svg.style.overflow = 'visible';

    var defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
    var grad = document.createElementNS('http://www.w3.org/2000/svg', 'linearGradient');
    grad.setAttribute('id', 'cg');
    grad.setAttribute('x1', '0%'); grad.setAttribute('y1', '0%');
    grad.setAttribute('x2', '0%'); grad.setAttribute('y2', '100%');
    var s1 = document.createElementNS('http://www.w3.org/2000/svg', 'stop');
    s1.setAttribute('offset', '0%'); s1.setAttribute('style', 'stop-color:#ff69b4;stop-opacity:0.25');
    var s2 = document.createElementNS('http://www.w3.org/2000/svg', 'stop');
    s2.setAttribute('offset', '100%'); s2.setAttribute('style', 'stop-color:#ff69b4;stop-opacity:0.02');
    grad.appendChild(s1); grad.appendChild(s2);
    defs.appendChild(grad); svg.appendChild(defs);

    var pts = [];
    for (var k = 0; k < temps.length; k++) {
      pts.push({ x: (k / (temps.length - 1)) * 100, y: 100 - ((temps[k] - minT) / range) * 80 - 10, h: new Date(times[k]).getHours() });
    }

    var path = 'M ' + pts[0].x + ' ' + pts[0].y;
    for (var l = 1; l < pts.length; l++) {
      var cpx = (pts[l-1].x + pts[l].x) / 2;
      path += ' C ' + cpx + ' ' + pts[l-1].y + ', ' + cpx + ' ' + pts[l].y + ', ' + pts[l].x + ' ' + pts[l].y;
    }
    var fill = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    fill.setAttribute('d', path + ' L 100 100 L 0 100 Z');
    fill.setAttribute('fill', 'url(#cg)');
    svg.appendChild(fill);
    var line = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    line.setAttribute('d', path);
    line.setAttribute('fill', 'none');
    line.setAttribute('stroke', '#ff69b4');
    line.setAttribute('stroke-width', '2.5');
    svg.appendChild(line);

    for (var m = 0; m < pts.length; m++) {
      if (m % 4 === 0) {
        var t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        t.setAttribute('x', pts[m].x + '%'); t.setAttribute('y', '155');
        t.setAttribute('text-anchor', 'middle'); t.setAttribute('fill', '#d97bb8');
        t.setAttribute('font-size', '10'); t.textContent = pts[m].h + ':00';
        svg.appendChild(t);
      }
      var c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      c.setAttribute('cx', pts[m].x + '%'); c.setAttribute('cy', pts[m].y + '%');
      c.setAttribute('r', '3'); c.setAttribute('fill', '#ff69b4');
      c.setAttribute('stroke', '#fff5f9'); c.setAttribute('stroke-width', '2');
      svg.appendChild(c);
    }
    container.appendChild(svg);
  }

        var lon = position.coords.longitude;
        var cityName = '当前位置';
        var countryName = '';
        
        // 快速匹配最近的预设城市（同步执行，无需等待）
        var nearestCity = null;
        var minDist = Infinity;
        for (var i = 0; i < HOT_CITIES.length; i++) {
          var c = HOT_CITIES[i];
          var dist = Math.sqrt(Math.pow(c.lat - lat, 2) + Math.pow(c.lon - lon, 2));
          if (dist < minDist) {
            minDist = dist;
            nearestCity = c;
          }
        }
        
        // 距离小于2度（约200km）使用匹配城市
        if (nearestCity && minDist < 2) {
          cityName = nearestCity.name;
          countryName = nearestCity.country;
        } else {
          cityName = '当前位置';
        }
        
        // 先显示匹配城市，不等待精确名称
        loadWeatherByCoords(lat, lon, cityName, countryName);
        
        // 后台尝试获取更精确城市名（不阻塞）
        fetch('https://nominatim.openstreetmap.org/reverse?lat=' + lat + '&lon=' + lon + '&format=json&accept-language=zh', {
          headers: { 'User-Agent': '77天气/1.0' }
        }).then(function(res) { return res.json(); }).then(function(geoData) {
          if (geoData && geoData.address) {
            var addr = geoData.address;
            var preciseCity = addr.city || addr.town || addr.village || addr.county || null;
            if (preciseCity && preciseCity !== cityName) {
              document.getElementById('cityName').textContent = preciseCity;
              document.getElementById('cityBtn').textContent = '📍 ' + preciseCity;
            }
          }
        }).catch(function() {});
      },
      function(error) {
        // 获取失败，使用默认城市
        console.warn('定位失败:', error);
        loadWeatherByCoords(39.9042, 116.4074, '北京', '中国');
      },
      { timeout: 10000, maximumAge: 300000 }
    );
  } else {
    // 不支持定位
    loadWeatherByCoords(39.9042, 116.4074, '北京', '中国');
  }
})();
</script>
</body>
</html>
